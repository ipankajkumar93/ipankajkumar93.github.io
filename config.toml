# The URL the site will be built for
base_url = "https://pankajkumar.xyz/"
title = "Pankaj Kumar"
description = "Code explorations, engineering thoughts, and life in between."
generate_feeds = true
feed_filenames = ["atom.xml"] # default template

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false
minify_html = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

taxonomies = [
  {name = "travel_tags", feed = true},
  {name = "rtd_tags", feed = true},
  {name = "post_tags", feed = true},
]

[search]
index_format = "elasticlunr_javascript"

[markdown]
render_emoji = true
smart_punctuation = true
insert_anchor_links = "right"
external_links_target_blank = true
external_links_no_referrer = false  # Handled by Referrer-Policy header in _headers

[markdown.highlighting]
enabled = true
# Add "-default" suffix to theme name in case you need a darker variant
light_theme = "github-light-default"
dark_theme = "github-dark-default"


[extra]
featured_sections = ["posts", "rtd", "travel"]
date_format="%d %b, %Y"
favicon = "/favicon.svg"
email = "ipankaj.singh10+website@gmail.com"
github = "https://github.com/ipankajkumar93"
linkedin = "https://linkedin.com/in/ipankajkumar93"
twitter = "https://x.com/ipankajkumar93"

[[extra.main_menu]]
name = "Posts"
url = "@/posts/_index.md"

[[extra.main_menu]]
name = "Projects"
url = "@/projects/_index.md"

[[extra.main_menu]]
name = "Services"
url = "@/services.md"

[[extra.main_menu]]
name = "Talks"
url = "@/talks.md"

[[extra.main_menu]]
name = "RTD"
url = "@/rtd/_index.md"

[[extra.main_menu]]
name = "Travel"
url = "@/travel/_index.md"

