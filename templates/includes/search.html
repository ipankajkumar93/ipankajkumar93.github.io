<script>
// ── Search ─────────────────────────────────────────────
(function () {
    const searchBtn = document.querySelector('.search-btn');
    const searchModal = document.getElementById('search-modal');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchClose = document.querySelector('.search-close');
    const searchBackdrop = document.querySelector('.search-modal-backdrop');

    // Project data for client-side search (loaded from Zola data)
    {% set data = load_data(path="content/projects/data.toml", format="toml") %}
    const projectData = [
        {% for proj in data.project %}
        {
            name: {{ proj.name | json_encode() | safe }},
            description: {{ proj.description | json_encode() | safe }},
            url: {% if proj.links %}{{ proj.links[0].url | json_encode() | safe }}{% else %}""{% endif %},
            language: {{ proj.language | default(value="") | json_encode() | safe }},
            stars: {{ proj.stars | default(value=0) }}
        },
        {% endfor %}
    ];

    let searchIndex = null;
    let debounceTimer = null;

    // Escape all 5 HTML special characters to prevent XSS
    function sanitize(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function initSearchIndex() {
        if (searchIndex) return;
        if (typeof elasticlunr !== 'undefined' && typeof window.searchIndex !== 'undefined') {
            searchIndex = elasticlunr.Index.load(window.searchIndex);
        }
    }

    function openSearch() {
        // Set content before showing the modal to avoid a blank flash
        searchResults.innerHTML = '<div class="search-empty-state">What are you looking for?</div>';
        searchInput.value = '';
        searchModal.classList.add('active');
        document.body.style.overflow = 'hidden';

        if (window.__searchLoaded && window.__searchLoaded()) {
            initSearchIndex();
            // Focus after the modal open transition ends so the element is fully visible
            searchModal.querySelector('.search-modal-content').addEventListener(
                'transitionend', () => searchInput.focus(), { once: true }
            );
        } else {
            searchResults.innerHTML = '<div class="search-empty-state">Indexing…</div>';
            searchInput.disabled = true;
            window.__loadSearch(function() {
                initSearchIndex();
                searchInput.disabled = false;
                searchResults.innerHTML = '<div class="search-empty-state">What are you looking for?</div>';
                searchInput.focus();
            });
        }
    }

    function closeSearch() {
        searchModal.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Categorize a URL into a section name
    function getCategory(url) {
        {%- if config.extra.main_menu %}
        {%- for item in config.extra.main_menu %}
        {%- if not item.url is matching("https?://") %}
        if (url.includes('{{ item.url | replace(from="@", to="") | replace(from="_index.md", to="") | replace(from=".md", to="") | safe }}')) return '{{ item.name | safe }}';
        {%- endif %}
        {%- endfor %}
        {%- endif %}
        return 'Other';
    }

    // Search projects client-side
    function searchProjects(query) {
        const q = query.toLowerCase();
        return projectData.filter(p =>
            p.name.toLowerCase().includes(q) ||
            p.description.toLowerCase().includes(q) ||
            p.language.toLowerCase().includes(q)
        ).map(p => ({
            title: p.name,
            description: p.description,
            url: p.url,
            category: 'Projects'
        }));
    }

    function performSearch(query) {
        if (!query || query.length < 2) {
            searchResults.innerHTML = '<div class="search-empty-state">What are you looking for?</div>';
            return;
        }

        let results = [];

        // Search elasticlunr index (pages)
        if (searchIndex) {
            const elasticResults = searchIndex.search(query, {
                fields: { title: { boost: 3 }, body: { boost: 1 } },
                bool: 'OR',
                expand: true
            });

            results = elasticResults.slice(0, 20).map(r => {
                const item = searchIndex.documentStore.getDoc(r.ref);
                // Extract path from full URL so it works on any domain
                let resultUrl = r.ref;
                try {
                    const parsed = new URL(r.ref);
                    resultUrl = parsed.pathname;
                } catch(e) { /* already a relative path */ }
                return {
                    title: item.title,
                    description: item.body ? item.body.substring(0, 150) + '…' : '',
                    url: resultUrl,
                    category: getCategory(r.ref)
                };
            });
        }

        // Search projects
        const projectResults = searchProjects(query).slice(0, 10);
        // Merge, avoiding duplicates
        const existingUrls = new Set(results.map(r => r.url));
        projectResults.forEach(p => {
            if (!existingUrls.has(p.url)) {
                results.push(p);
            }
        });

        if (results.length === 0) {
            searchResults.innerHTML = '<div class="search-empty-state">No results found for "' + query.replace(/</g, '&lt;') + '"</div>';
            return;
        }

        // Group by category
        const grouped = {};
        const categoryOrder = [
            {%- if config.extra.main_menu %}
            {%- for item in config.extra.main_menu %}
            '{{ item.name | safe }}',
            {%- endfor %}
            {%- endif %}
            'Other'
        ];
        results.forEach(r => {
            if (!grouped[r.category]) grouped[r.category] = [];
            grouped[r.category].push(r);
        });

        // Render
        let html = '';
        categoryOrder.forEach(cat => {
            if (!grouped[cat]) return;
            html += '<div class="search-group">';
            html += '<h3 class="search-group-title">' + sanitize(cat) + ' <span class="search-group-count">(' + grouped[cat].length + ')</span></h3>';
            grouped[cat].forEach(item => {
                const isExternal = item.url && (item.url.startsWith('http://') || item.url.startsWith('https://'));
                const targetAttr = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
                html += '<a href="' + sanitize(item.url) + '"' + targetAttr + ' class="search-result-item" role="option">';
                html += '<span class="search-result-title">' + sanitize(item.title) + '</span>';
                if (item.description) {
                    html += '<span class="search-result-desc">' + sanitize(item.description).substring(0, 120) + '</span>';
                }
                html += '</a>';
            });
            html += '</div>';
        });

        searchResults.innerHTML = html;
    }

    // Event listeners
    searchBtn.addEventListener('click', openSearch);
    searchClose.addEventListener('click', closeSearch);
    searchBackdrop.addEventListener('click', closeSearch);

    searchInput.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => performSearch(this.value.trim()), 250);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function (e) {
        // Ctrl+K or Cmd+K to open search
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            if (searchModal.classList.contains('active')) {
                closeSearch();
            } else {
                openSearch();
            }
        }
        // Escape to clear or close
        if (e.key === 'Escape' && searchModal.classList.contains('active')) {
            e.preventDefault();
            if (searchInput.value) {
                searchInput.value = '';
                performSearch('');
                searchInput.focus();
            } else {
                closeSearch();
            }
        }
    });

    // Arrow navigation and Focus trap
    searchModal.addEventListener('keydown', function (e) {
        if (!searchModal.classList.contains('active')) return;

        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            const results = Array.from(searchResults.querySelectorAll('.search-result-item'));
            if (results.length === 0) return;
            
            e.preventDefault();
            const active = document.activeElement;
            const currentIndex = results.indexOf(active);
            let nextIndex = 0;

            if (e.key === 'ArrowDown') {
                nextIndex = currentIndex < results.length - 1 ? currentIndex + 1 : 0;
            } else {
                nextIndex = currentIndex > 0 ? currentIndex - 1 : results.length - 1;
            }
            results[nextIndex].focus();
            return;
        }

        if (e.key === 'Tab') {
            const focusable = Array.from(
                searchModal.querySelectorAll('a[href], button:not([disabled]), input:not([disabled]), [tabindex]:not([tabindex="-1"])')
            ).filter(el => !el.closest('[aria-hidden="true"]'));

            if (focusable.length === 0) return;

            const first = focusable[0];
            const last = focusable[focusable.length - 1];

            if (e.shiftKey) {
                if (document.activeElement === first || document.activeElement === searchModal) {
                    e.preventDefault();
                    last.focus();
                }
            } else {
                if (document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        }
    });
})();
</script>
