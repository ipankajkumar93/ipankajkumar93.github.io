{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ super() }}{% endblock %}

{% block main %}
<div class="section-header">
  <h1>{{ page.title }}</h1>
  {% if page.description %}
  <p class="section-description">{{ page.description | markdown(inline=true) | safe }}</p>
  {% endif %}
</div>

<div class="post-content">
  {{ page.content | safe }}
</div>
{% endblock %}
